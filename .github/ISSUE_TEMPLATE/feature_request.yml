name: Feature request
description: Propose a focused improvement to the tmux session workflow
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What tmux session task is difficult today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the command, key, or UI behavior you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Explain current workarounds or simpler alternatives.
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Operating system, terminal, and tmux version if relevant.
